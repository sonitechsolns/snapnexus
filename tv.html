<script>
    const S_URL = 'https://yaxajpojbssrrdycuzeo.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheGFqcG9qYnNzcnRjYXl1emVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzYxMzMsImV4cCI6MjA5MDAxMjEzM30.-C0og62G8tIvl6CxmxOHpTq5l8FELn3WVQZHl43k20U'; 
    const client = supabase.createClient(S_URL, S_KEY);

    let photos = [];
    let idx = 0;

    async function sync() {
        console.log("Checking for new photos...");
        // This looks inside the 'live' folder in your 'events' bucket
        const { data, error } = await client.storage
            .from('events')
            .list('live', { sortBy: { column: 'created_at', order: 'desc' } });

        if (error) {
            console.error("TV Error:", error);
            return;
        }

        if (data && data.length > 0) {
            // Filter out any weird system files
            photos = data.filter(f => f.name !== '.emptyFolderPlaceholder');
            console.log("Found photos:", photos.length);
        } else {
            console.log("Bucket is empty or folder 'live' not found.");
        }
    }

    function rotate() {
        if (photos.length === 0) return;
        
        const fileName = photos[idx].name;
        const { data } = client.storage.from('events').getPublicUrl(`live/${fileName}`);
        
        console.log("Showing:", data.publicUrl);
        document.getElementById('display').style.backgroundImage = `url('${data.publicUrl}')`;
        
        idx = (idx + 1) % photos.length;
    }

    // Sync every 5 seconds, Rotate every 3 seconds
    setInterval(sync, 5000); 
    setInterval(rotate, 3000);
    sync();
</script>
