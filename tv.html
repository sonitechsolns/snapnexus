<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNexus | Live Wall</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#020617; color:white; font-family:system-ui; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
        .header { padding:20px; text-align:center; background:rgba(0,0,0,0.5); }
        .photo-wall { flex:1; position:relative; display:flex; align-items:center; justify-content:center; }
        .slide-img { position:absolute; max-width:90%; max-height:85%; object-fit:contain; opacity:0; transition:opacity 1s; border-radius:12px; }
        .slide-img.active { opacity:1; }
        .empty { text-align:center; color:#64748b; }
    </style>
</head>
<body>
<div class="header">
    <h2>SnapNexus Live Wall</h2>
    <div id="eventLabel">Event: loading...</div>
</div>
<div class="photo-wall" id="photoWall">
    <div id="emptyMsg" class="empty">Waiting for first photo...</div>
    <img id="img1" class="slide-img" alt="">
    <img id="img2" class="slide-img" alt="">
</div>

<script>
    const PROJECT_ID = '69d8eda100264f4e42ae';
    const BUCKET_ID = '69d8f2b800397ad57e50';
    const client = new Appwrite.Client()
        .setEndpoint('https://cloud.appwrite.io/v1')
        .setProject(PROJECT_ID);
    const storage = new Appwrite.Storage(client);
    
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('event') || 'test123';
    document.getElementById('eventLabel').innerText = `Event: ${eventId}`;
    
    let photos = [];
    let currentIndex = 0;
    let activeImg = 0;
    let interval = null;
    const imgElements = [document.getElementById('img1'), document.getElementById('img2')];
    const emptyMsg = document.getElementById('emptyMsg');
    
    async function fetchPhotos() {
        try {
            const result = await storage.listFiles(BUCKET_ID);
            const files = result.files || [];
            if (files.length === 0) {
                photos = [];
                emptyMsg.style.display = 'block';
                imgElements.forEach(img => img.classList.remove('active'));
                return;
            }
            emptyMsg.style.display = 'none';
            const newUrls = files.map(f => storage.getFileView(BUCKET_ID, f.$id));
            // Check if new photos added
            if (JSON.stringify(newUrls) !== JSON.stringify(photos)) {
                photos = newUrls;
                if (photos.length > 0 && currentIndex === 0) {
                    imgElements[activeImg].src = photos[0];
                    imgElements[activeImg].classList.add('active');
                }
            }
        } catch(err) {
            console.error(err);
        }
    }
    
    function startSlideshow() {
        if (interval) clearInterval(interval);
        if (photos.length === 0) return;
        interval = setInterval(() => {
            if (photos.length === 0) return;
            currentIndex = (currentIndex + 1) % photos.length;
            const nextActive = 1 - activeImg;
            imgElements[nextActive].src = photos[currentIndex];
            imgElements[nextActive].classList.add('active');
            imgElements[activeImg].classList.remove('active');
            activeImg = nextActive;
        }, 5000);
    }
    
    async function refresh() {
        await fetchPhotos();
        startSlideshow();
    }
    
    refresh();
    setInterval(refresh, 5000);
</script>
</body>
</html>
