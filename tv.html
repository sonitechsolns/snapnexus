<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SnapNexus | Live Feed</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #display { width: 100vw; height: 100vh; background-size: contain; background-position: center; background-repeat: no-repeat; transition: background-image 1.5s ease-in-out; display: flex; align-items: center; justify-content: center; }
        .branding { position: absolute; bottom: 30px; left: 30px; background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 15px; border: 1px solid #38bdf8; color: white; }
        #debug { position: absolute; top: 20px; right: 20px; font-size: 12px; color: #4ade80; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="display">
        <h2 id="msg" style="color: #1e293b;">Awaiting First Upload...</h2>
    </div>
    <div class="branding"><h1>SnapNexus</h1><p>Soni Tech Solutions</p></div>
    <div id="debug">System Booting...</div>

    <script>
       // Make sure there are NO spaces and NO trailing slashes /
// --- 🚩 THE SONI TECH FIX 🚩 ---
const S_URL = 'https://yaxajpojbssrrdcyuzeo.supabase.co'; 
const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheGFqcG9qYnNzcnJkeWN1emVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzYxMzMsImV4cCI6MjA5MDAxMjEzM30.-C0og62G8tIvl6CxmxOHpTq5l8FELn3WVQZHl43k20U'; 

// Initialize
const sb = supabase.createClient(S_URL, S_KEY);

        let photos = [];
        let idx = 0;

        async function sync() {
            // Looking specifically in the 'live' folder
            const { data, error } = await sb.storage.from('events').list('live');
            if (error) {
                document.getElementById('debug').innerText = "ERROR: " + error.message;
                return;
            }
            if (data) {
                photos = data.filter(f => f.name.includes('.') && f.name !== '.emptyFolderPlaceholder');
                document.getElementById('debug').innerText = `Nexus Online: ${photos.length} Photos`;
                if(photos.length > 0) document.getElementById('msg').style.display = 'none';
            }
        }

        function rotate() {
            if (photos.length === 0) return;
            const fileName = photos[idx].name;
            const { data } = sb.storage.from('events').getPublicUrl(`live/${fileName}`);
            
            const img = new Image();
            img.src = data.publicUrl;
            img.onload = () => {
                document.getElementById('display').style.backgroundImage = `url('${data.publicUrl}')`;
            };
            idx = (idx + 1) % photos.length;
        }

        setInterval(sync, 5000); 
        setInterval(rotate, 4000);
        sync();
    </script>
</body>
</html>
