<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
    <title>SnapNexus | Guest Portal</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-size: 68px;
            --card-max-width: 360px;
            --btn-width: 190px;
            --main-font-size: 1.18em;
            --zoom-factor: 1.14;
            --fusion-a: #ff9800;
            --fusion-b: #ffec43;
            --fusion-c: #ff7200;
            --fusion-d: #ffa726;
            --fusion-e: #ffd600;
            --primary-btn: #ff9800;
            --primary-btn-hover: #ff7900;
            --secondary-btn: #ffa726;
            --secondary-btn-hover: #ffc107;
        }
        html {
            font-size: 18px;
            /* Zoom in */
            transform: scale(var(--zoom-factor));
            transform-origin: top center;
            min-width: 360px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', 'Urbanist', sans-serif;
            background: linear-gradient(140deg, var(--fusion-a) 0%, var(--fusion-b) 53%, var(--fusion-c) 100%);
            color: #232021;
            min-height: 100vh;
            min-width: 0;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-size: var(--main-font-size);
        }
        main {
            width: 100%;
            min-width: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 72px;
            margin-bottom: 26px;
        }
        .main-logo-img {
            width: var(--logo-size);
            height: var(--logo-size);
            object-fit: contain;
            border-radius: 17px;
            margin-bottom: 15px;
            background: #fff6eb;
            border: 2.5px solid var(--fusion-c);
            box-shadow: 0 2.5px 8px #ff98005c;
        }
        .main-logo-title {
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            font-size: 1.55rem;
            font-weight: 900;
            letter-spacing: 1.1px;
            color: var(--fusion-c);
            text-align: center;
            margin-bottom: 12px;
        }
        .card {
            background: rgba(255, 255, 255, 0.93);
            padding: 32px 22px 18px 22px;
            border-radius: 19px;
            box-shadow: 0 2.5px 10px #ff98001f, 0 0.5px 2.5px #ffc10712;
            border: 1px solid #ffc1071c;
            text-align: center;
            width: 96%;
            max-width: var(--card-max-width);
            margin: auto 0 30px 0;
            min-height: 144px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card-description {
            margin-bottom: 22px;
            font-size: 1.11rem;
            color: #993e00;
            font-weight: 700;
            letter-spacing: 0.22px;
        }
        .btn-row {
            width: 100%;
            display: flex;
            flex-direction: row;
            gap: 14px;
            justify-content: center;
            margin: 12px 0 4px 0;
        }
        .simple-btn,
        .contact-btn,
        .business-btn {
            border: none;
            padding: 16px 0;
            border-radius: 44px;
            font-size: 1.06rem;
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            font-weight: 800;
            cursor: pointer;
            outline: none;
            transition: background 0.19s, box-shadow 0.16s, color 0.13s;
            width: var(--btn-width);
            box-shadow: 0 1.5px 8px #ffc10727;
            margin-bottom: 8px;
        }
        .simple-btn {
            background: var(--primary-btn);
            color: #fff;
        }
        .simple-btn:hover, .simple-btn:focus {
            background: var(--primary-btn-hover);
            color: #fffbea;
        }
        .contact-btn {
            background: var(--secondary-btn);
            color: #28221a;
            margin-top: 0;
        }
        .contact-btn:hover, .contact-btn:focus {
            background: var(--secondary-btn-hover);
            color: #28221a;
        }
        .business-btn {
            background: #fff;
            color: var(--fusion-c);
            border: 2px solid var(--fusion-c);
        }
        .business-btn:hover, .business-btn:focus {
            background: var(--fusion-c);
            color: #fff;
        }
        .file-chip {
            display: inline-block;
            margin-top: 7px;
            padding: 7px 14px;
            color: var(--fusion-c);
            background: rgba(255, 168, 54, 0.17);
            border-radius: 15px;
            font-size: 1.02rem;
            font-weight: 700;
            border: 1px solid #ff980025;
            box-shadow: 0 1.2px 4px 0 #ff98000a;
            word-break: break-all;
            max-width: 92vw;
        }
        #status {
            margin-top: 16px;
            color: #ad640b;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.12px;
            min-height: 24px;
            transition: color 0.14s;
            word-break: break-word;
        }
        #status[success] {
            color: #4ed242;
        }
        #status[fail] {
            color: #f43f5e;
        }
        .footer {
            width: 100vw;
            min-width: 0;
            padding: 16px 0 11px 0;
            background: linear-gradient(98deg, #fffbe7 22%, #ffe3a1 79%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 1.05rem;
            opacity: 0.95;
            margin-top: 34px;
            box-shadow: 0px -5px 32px #ff980022;
        }
        .footer-wrap {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }
        .footer-logo-img {
            width: 25px;
            height: 25px;
            border-radius: 7px;
            background: #fff2dc;
            object-fit: contain;
            border: 1.5px solid #ffa726;
            box-shadow: 0px 0.7px 5px #ffc10736;
        }
        .footer-rights {
            color: #aa6d00;
            font-size: 0.97rem;
            margin-left: 10px;
            text-align: center;
        }
        .footer .footer-company {
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            font-weight: 900;
            letter-spacing: 0.59px;
            font-size: 1.11rem;
            color: #ff9800;
        }
        @media (max-width: 900px) {
            :root {
                --card-max-width: 430px;
            }
            .main-logo-area { margin-top: 52px;}
            .main-logo-title { font-size: 1.21rem;}
            html { font-size: 17px; }
        }
        @media (max-width: 650px) {
            :root {
                --card-max-width: 98vw;
                --logo-size: 49px;
                --btn-width: 98vw;
            }
            html {
                transform: scale(1);
                font-size: 16px;
            }
            .main-logo-area { margin-top: 34px;}
            .card { padding: 14px 2vw; }
            .main-logo-title { font-size: 1.13rem;}
            .main-logo-img { width: var(--logo-size); height: var(--logo-size);}
            .simple-btn,
            .contact-btn,
            .business-btn { width: 95vw; font-size: 1.05rem;}
            .file-chip { font-size: 0.98rem; max-width: 95vw;}
        }
        @media (max-width: 440px) {
            .footer { font-size: 0.99rem; padding: 8px 0 4px 0; }
            .card-description { font-size: 0.97rem;}
            .footer .footer-company { font-size: 1rem; }
            .btn-row { gap: 8px; }
        }
        @media (max-width: 380px) {
            .main-logo-area { margin-top: 8px; }
            .main-logo-title { font-size: 0.97rem;}
            .main-logo-img { width: 32px; height: 32px;}
            .footer-logo-img { width: 19px; height: 19px;}
            html { font-size: 13px;}
        }
    </style>
</head>
<body>
    <main>
        <div class="main-logo-area">
            <img src="SNAPN.png" alt="SnapNexus Logo" class="main-logo-img" id="mainLogo">
            <div class="main-logo-title">SnapNexus</div>
        </div>

        <div class="card" id="mainCard">
            <div class="card-description">Soni Tech Solutions</div>
            <div class="btn-row">
                <button class="simple-btn" id="simpleBtn" onclick="document.getElementById('p').click()">
                    Select Photo
                </button>
                <button class="contact-btn" id="contactBtn" onclick="window.location.href='mailto:info@sonitechsolutions.com';">
                    Contact Us
                </button>
                <button class="business-btn" id="businessBtn" onclick="window.open('https://sonitechsolutions.com/business','_blank');">
                    For Business
                </button>
            </div>
            <input type="file" id="p" hidden accept="image/*">
            <div id="selectedFile"></div>
            <div id="status">System Online</div>
        </div>
    </main>
    <footer class="footer">
        <div class="footer-wrap">
            <img src="STS.png" alt="STS Parent Logo" class="footer-logo-img" id="footerLogo">
            <span class="footer-company">Soni Tech Solutions</span>
        </div>
        <div class="footer-rights">
            ©2026 STS All rights reserved.
        </div>
    </footer>
    <script>
        // SnapNexus photo upload logic
        const S_URL = 'https://yaxajpojbssrrdcyuzeo.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheGFqcG9qYnNzcnJkY3l1emVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzYxMzMsImV4cCI6MjA5MDAxMjEzM30.-C0og62G8tIvl6CxmxOHpTq5l8FELn3WVQZHl43k20U';
        const nexusClient = supabase.createClient(S_URL, S_KEY);
        const st = document.getElementById('status');
        const fileInput = document.getElementById('p');
        const selectedFileDiv = document.getElementById('selectedFile');

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            selectedFileDiv.innerHTML = '';
            if (!file) {
                st.innerText = "System Online";
                st.removeAttribute('success');
                st.removeAttribute('fail');
                return;
            }

            let chip = document.createElement("div");
            chip.className = "file-chip";
            chip.textContent = file.name.length > 26 ? file.name.slice(0, 22) + '...' : file.name;
            selectedFileDiv.appendChild(chip);

            st.innerText = "Uploading...";
            st.removeAttribute('fail'); st.removeAttribute('success');

            const path = `live/${Date.now()}_${file.name.replace(/\s/g, '_')}`;

            const { data, error } = await nexusClient.storage
                .from('events')
                .upload(path, file);

            if (error) {
                alert("Failed: " + error.message);
                st.innerText = "❌ Failed";
                st.setAttribute('fail', '');
                st.removeAttribute('success');
            } else {
                alert("✅ Success! Photo uploaded.");
                st.innerText = "✅ Uploaded!";
                st.setAttribute('success', '');
                st.removeAttribute('fail');
            }
        };
    </script>
</body>
</html>
