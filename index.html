<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNexus | Soni Tech Solutions</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
        }
        .container { 
            background: rgba(30, 41, 59, 0.7); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            text-align: center; 
            max-width: 400px; 
            width: 100%; 
            border: 1px solid #334155;
            backdrop-filter: blur(10px);
        }
        .logo { 
            font-size: 2.8rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #38bdf8, #818cf8); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 5px; 
            letter-spacing: -1px;
        }
        .brand { 
            font-size: 0.85rem; 
            color: #94a3b8; 
            margin-bottom: 40px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }
        .upload-btn { 
            background: linear-gradient(135deg, #38bdf8, #2563eb); 
            color: white; 
            font-weight: 600; 
            font-size: 1.2rem; 
            padding: 16px 32px; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
        .upload-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 25px rgba(37, 99, 235, 0.4); 
        }
        .upload-btn:active { 
            transform: translateY(0); 
        }
        #status { 
            margin-top: 30px; 
            font-size: 1rem; 
            font-weight: 500; 
            min-height: 24px; 
            color: #64748b; 
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">SnapNexus</h1>
        <p class="brand">Soni Tech Solutions</p>
        
        <label for="filePicker" class="upload-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Upload Photo
        </label>
        <input type="file" id="filePicker" accept="image/*">
        
        <div id="status">Ready for connection.</div>
    </div>

    <script>
        // EXACT CREDENTIALS FROM YOUR SCREENSHOTS
        const URL = 'https://yaxajpojbssrrdycuzeo.supabase.co'; 
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheGFqcG9qYnNzcnJkY3l1emVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzYxMzMsImV4cCI6MjA5MDAxMjEzM30.-C0og62G8tIvl6CxmxOHpTq5l8FELn3WVQZHl43k20U'; // <-- Replace this string

        const supabase = window.supabase.createClient(URL, KEY);
        const statusEl = document.getElementById('status');

        document.getElementById('filePicker').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusEl.style.color = '#38bdf8';
            statusEl.innerText = "Syncing to Cloud...";

            // Clean filename to prevent upload errors
            const safeName = file.name.replace(/[^a-zA-Z0-9.]/g, '_');
            const filePath = `live/${Date.now()}_${safeName}`;

            const { data, error } = await supabase.storage
                .from('events')
                .upload(filePath, file, { cacheControl: '3600', upsert: false });

            if (error) {
                statusEl.style.color = '#ef4444';
                statusEl.innerText = "❌ Failed: " + error.message;
            } else {
                statusEl.style.color = '#22c55e';
                statusEl.innerText = "✅ Successfully Unified!";
                
                // Reset file input so they can upload another immediately
                e.target.value = '';
                
                // Reset status text after 3 seconds
                setTimeout(() => {
                    statusEl.style.color = '#64748b';
                    statusEl.innerText = "Ready for next photo.";
                }, 3000);
            }
        });
    </script>
</body>
</html>
