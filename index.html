<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
    <title>SnapNexus | Guest Portal</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-size: 54px;
            --card-max-width: 300px;
            --btn-width: 150px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', 'Urbanist', sans-serif;
            background: linear-gradient(120deg, #1e293b 0%, #0ea5e9 100%);
            color: #f8fafc;
            min-height: 100vh;
            min-width: 0;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        main {
            width: 100%;
            min-width: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 54px;
            margin-bottom: 20px;
        }
        .main-logo-img {
            width: var(--logo-size);
            height: var(--logo-size);
            object-fit: contain;
            border-radius: 16px;
            margin-bottom: 12px;
            background: #111827;
            border: 2px solid #38bdf8;
        }
        .main-logo-title {
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 0.9px;
            color: #38bdf8;
            text-align: center;
        }
        .card {
            background: rgba(30, 41, 59, 0.96);
            padding: 22px 16px 15px 16px;
            border-radius: 16px;
            box-shadow: 0 1.5px 6px #0ea5e91c;
            border: 1px solid #33415525;
            text-align: center;
            width: 95%;
            max-width: var(--card-max-width);
            margin: auto 0 24px 0;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card-description {
            margin-bottom: 18px;
            font-size: .95rem;
            color: #64748b;
            font-weight: 600;
            letter-spacing: 0.18px;
        }
        .simple-btn {
            background: #38bdf8;
            color: #fff;
            border: none;
            padding: 13px 0;
            width: var(--btn-width);
            border-radius: 40px;
            font-size: 1rem;
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            font-weight: 700;
            margin-top: 14px;
            margin-bottom: 11px;
            cursor: pointer;
            outline: none;
            transition: background 0.18s;
        }
        .simple-btn:hover, .simple-btn:focus {
            background: #0ea5e9;
        }
        .file-chip {
            display: inline-block;
            margin-top: 7px;
            padding: 6px 12px;
            color: #38bdf8;
            background: rgba(56,189,248,0.10);
            border-radius: 13px;
            font-size: 0.93rem;
            font-weight: 600;
            border: 1px solid #38bdf81b;
            box-shadow: 0 1px 3px 0 #0ea5e90a;
            word-break: break-all;
            max-width: 85vw;
        }
        #status {
            margin-top: 15px;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.96rem;
            letter-spacing: 0.09px;
            min-height: 20px;
            transition: color 0.14s;
            word-break: break-word;
        }
        #status[success] {
            color: #22fbac;
        }
        #status[fail] {
            color: #f43f5e;
        }
        .footer {
            width: 100vw;
            min-width: 0;
            padding: 10px 0 7px 0;
            background: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.92rem;
            opacity: 0.93;
            margin-top: 20px;
        }
        .footer-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
            flex-wrap: wrap;
        }
        .footer-logo-img {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: #111827ee;
            object-fit: contain;
            border: 1px solid #334155;
        }
        .footer-rights {
            color: #64748b;
            font-size: 0.92rem;
            margin-left: 8px;
            text-align: center;
        }
        .footer .footer-company {
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            font-weight: 900;
            letter-spacing: 0.59px;
            font-size: 0.99rem;
            color: #38bdf8;
        }
        @media (max-width: 900px) {
            :root {
                --card-max-width: 360px;
            }
            .main-logo-area { margin-top: 38px;}
            .main-logo-title { font-size: 1.13rem;}
        }
        @media (max-width: 620px) {
            :root {
                --card-max-width: 98vw;
                --logo-size: 40px;
                --btn-width: 98vw;
            }
            .main-logo-area { margin-top: 22px;}
            .card { padding: 11px 2vw; }
            .main-logo-title { font-size: 1.08rem;}
            .main-logo-img { width: var(--logo-size); height: var(--logo-size);}
            .simple-btn { width: 96vw; font-size: 0.98rem;}
            .file-chip { font-size: 0.91rem; max-width: 92vw;}
        }
        @media (max-width: 420px) {
            .footer { font-size: 0.86rem; padding: 8px 0 4px 0; }
            .card-description { font-size: 0.89rem;}
            .footer .footer-company { font-size: 0.93rem; }
        }
        @media (max-width: 340px) {
            .main-logo-area { margin-top: 9px; }
            .main-logo-title { font-size: 0.92rem;}
            .main-logo-img { width: 28px; height: 28px;}
            .footer-logo-img { width: 17px; height: 17px;}
        }
    </style>
</head>
<body>
    <main>
        <div class="main-logo-area">
            <img src="SNAPN.png" alt="SnapNexus Logo" class="main-logo-img" id="mainLogo">
            <div class="main-logo-title">SnapNexus</div>
        </div>

        <div class="card" id="mainCard">
            <div class="card-description">Soni Tech Solutions</div>
            <button class="simple-btn" id="simpleBtn" onclick="document.getElementById('p').click()">
                Select Photo
            </button>
            <input type="file" id="p" hidden accept="image/*">
            <div id="selectedFile"></div>
            <div id="status">System Online</div>
        </div>
    </main>
    <footer class="footer">
        <div class="footer-wrap">
            <img src="STS.png" alt="STS Parent Logo" class="footer-logo-img" id="footerLogo">
            <span class="footer-company">Soni Tech Solutions</span>
        </div>
        <div class="footer-rights">
            ©2026 STS All rights reserved.
        </div>
    </footer>
    <script>
        // SnapNexus photo upload logic
        const S_URL = 'https://yaxajpojbssrrdcyuzeo.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheGFqcG9qYnNzcnJkY3l1emVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzYxMzMsImV4cCI6MjA5MDAxMjEzM30.-C0og62G8tIvl6CxmxOHpTq5l8FELn3WVQZHl43k20U';
        const nexusClient = supabase.createClient(S_URL, S_KEY);
        const st = document.getElementById('status');
        const fileInput = document.getElementById('p');
        const selectedFileDiv = document.getElementById('selectedFile');

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            selectedFileDiv.innerHTML = '';
            if (!file) {
                st.innerText = "System Online";
                st.removeAttribute('success');
                st.removeAttribute('fail');
                return;
            }

            let chip = document.createElement("div");
            chip.className = "file-chip";
            chip.textContent = file.name.length > 26 ? file.name.slice(0, 22) + '...' : file.name;
            selectedFileDiv.appendChild(chip);

            st.innerText = "Uploading...";
            st.removeAttribute('fail'); st.removeAttribute('success');

            const path = `live/${Date.now()}_${file.name.replace(/\s/g, '_')}`;

            const { data, error } = await nexusClient.storage
                .from('events')
                .upload(path, file);

            if (error) {
                alert("Failed: " + error.message);
                st.innerText = "❌ Failed";
                st.setAttribute('fail', '');
                st.removeAttribute('success');
            } else {
                alert("✅ Success! Photo uploaded.");
                st.innerText = "✅ Uploaded!";
                st.setAttribute('success', '');
                st.removeAttribute('fail');
            }
        };
    </script>
</body>
</html>
