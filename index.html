<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNexus | Guest Portal</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #0f172a; color: #f8fafc; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px;
        }
        .card { 
            background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 400px;
            border: 1px solid #334155; backdrop-filter: blur(12px);
        }
        .logo { font-size: 2.5rem; font-weight: 800; color: #38bdf8; margin-bottom: 10px; }
        .btn { 
            background: #2563eb; color: white; padding: 18px; border-radius: 50px; 
            border: none; width: 100%; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            margin-top: 20px; transition: 0.3s;
        }
        .btn:hover { background: #1d4ed8; transform: scale(1.02); }
        #status { margin-top: 20px; color: #94a3b8; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="logo">SnapNexus</h1>
        <p style="color:#64748b">Soni Tech Solutions</p>
        <button class="btn" onclick="document.getElementById('p').click()">SELECT PHOTO</button>
        <input type="file" id="p" hidden accept="image/*">
        <div id="status">System Online</div>
    </div>

    <script>
        // 🚩 I CHECKED THE URL - IT IS CORRECT
        const S_URL = 'https://yaxajpojbssrrdcyuzeo.supabase.co'; 
        
        // 🚩 PASTE THE FRESH KEY HERE (Ensure no extra 'tcay' letters!)
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheGFqcG9qYnNzcnJkY3l1emVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzYxMzMsImV4cCI6MjA5MDAxMjEzM30.-C0og62G8tIvl6CxmxOHpTq5l8FELn3WVQZHl43k20U'; 
    
        const nexusClient = supabase.createClient(S_URL, S_KEY);
        const st = document.getElementById('status');
    
        document.getElementById('p').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
    
            st.innerText = "⚡ UNIFYING...";
            const path = `live/${Date.now()}_${file.name.replace(/\s/g, '_')}`;
    
            const { data, error } = await nexusClient.storage
                .from('events') // 🚩 MAKE SURE YOUR BUCKET IS STILL NAMED 'events'
                .upload(path, file);
    
            if (error) {
                alert("STOPPED: " + error.message);
                st.innerText = "❌ FAILED";
            } else {
                alert("✅ SUCCESS! PHOTO UNIFIED.");
                st.innerText = "✅ UNIFIED!";
            }
        };
    </script>
</body>
</html>
