<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
    <title>SnapNexus | Guest Portal</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;900&display=swap" rel="stylesheet">
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        :root {
            --logo-size: 68px;
            --card-max-width: 360px;
            --btn-width: 190px;
            --main-font-size: 1.18em;
            --zoom-factor: 1.14;
            --fusion-a: #ff9800;
            --fusion-b: #ffec43;
            --fusion-c: #ff7200;
            --fusion-d: #ffa726;
            --fusion-e: #ffd600;
            --primary-btn: #ff9800;
            --primary-btn-hover: #ff7900;
            --secondary-btn: #ffa726;
            --secondary-btn-hover: #ffc107;
        }
        html {
            font-size: 18px;
            transform: scale(var(--zoom-factor));
            transform-origin: top center;
            min-width: 360px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', 'Urbanist', sans-serif;
            background: linear-gradient(140deg, var(--fusion-a) 0%, var(--fusion-b) 53%, var(--fusion-c) 100%);
            color: #232021;
            min-height: 100vh;
            min-width: 0;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-size: var(--main-font-size);
        }
        main {
            width: 100%;
            min-width: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 72px;
            margin-bottom: 26px;
        }
        .main-logo-img {
            width: var(--logo-size);
            height: var(--logo-size);
            object-fit: contain;
            border-radius: 17px;
            margin-bottom: 15px;
            background: #fff6eb;
            border: 2.5px solid var(--fusion-c);
            box-shadow: 0 2.5px 8px #ff98005c;
        }
        .main-logo-title {
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            font-size: 1.55rem;
            font-weight: 900;
            letter-spacing: 1.1px;
            color: var(--fusion-c);
            text-align: center;
            margin-bottom: 12px;
        }
        .card {
            background: rgba(255, 255, 255, 0.93);
            padding: 32px 22px 18px 22px;
            border-radius: 19px;
            box-shadow: 0 2.5px 10px #ff98001f, 0 0.5px 2.5px #ffc10712;
            border: 1px solid #ffc1071c;
            text-align: center;
            width: 96%;
            max-width: var(--card-max-width);
            margin: auto 0 30px 0;
            min-height: 144px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card-description {
            margin-bottom: 22px;
            font-size: 1.11rem;
            color: #993e00;
            font-weight: 700;
            letter-spacing: 0.22px;
        }
        .event-pill {
            font-size: 0.92rem;
            color: #b35a00;
            font-weight: 700;
            margin: -12px 0 14px 0;
            padding: 6px 12px;
            background: rgba(255, 152, 0, 0.12);
            border-radius: 999px;
            border: 1px solid #ff980030;
            max-width: 100%;
            word-break: break-word;
        }
        .btn-row {
            width: 100%;
            display: flex;
            flex-direction: row;
            gap: 14px;
            justify-content: center;
            margin: 12px 0 4px 0;
            flex-wrap: wrap;
        }
        .simple-btn,
        .contact-btn,
        .business-btn {
            border: none;
            padding: 16px 0;
            border-radius: 44px;
            font-size: 1.06rem;
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            font-weight: 800;
            cursor: pointer;
            outline: none;
            transition: background 0.19s, box-shadow 0.16s, color 0.13s;
            width: var(--btn-width);
            box-shadow: 0 1.5px 8px #ffc10727;
            margin-bottom: 8px;
        }
        .simple-btn {
            background: var(--primary-btn);
            color: #fff;
        }
        .simple-btn:hover:not(:disabled), .simple-btn:focus:not(:disabled) {
            background: var(--primary-btn-hover);
            color: #fffbea;
        }
        .simple-btn:disabled {
            cursor: not-allowed;
            opacity: 0.92;
        }
        .contact-btn {
            background: var(--secondary-btn);
            color: #28221a;
            margin-top: 0;
        }
        .contact-btn:hover, .contact-btn:focus {
            background: var(--secondary-btn-hover);
            color: #28221a;
        }
        .business-btn {
            background: #fff;
            color: var(--fusion-c);
            border: 2px solid var(--fusion-c);
        }
        .business-btn:hover, .business-btn:focus {
            background: var(--fusion-c);
            color: #fff;
        }

        /* Limit-reached banner */
        #limitBanner {
            display: none;
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.35);
            color: #991b1b;
            font-size: 0.92rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 12px;
            text-align: left;
        }
        #limitBanner.show { display: block; }

        .file-chip {
            display: inline-block;
            margin-top: 7px;
            padding: 7px 14px;
            color: var(--fusion-c);
            background: rgba(255, 168, 54, 0.17);
            border-radius: 15px;
            font-size: 1.02rem;
            font-weight: 700;
            border: 1px solid #ff980025;
            box-shadow: 0 1.2px 4px 0 #ff98000a;
            word-break: break-all;
            max-width: 92vw;
        }
        #status {
            margin-top: 16px;
            color: #ad640b;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.12px;
            min-height: 24px;
            transition: color 0.14s;
            word-break: break-word;
        }
        #status[success] { color: #4ed242; }
        #status[fail]    { color: #f43f5e; }

        .footer {
            width: 100vw;
            min-width: 0;
            padding: 16px 0 11px 0;
            background: linear-gradient(98deg, #fffbe7 22%, #ffe3a1 79%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 1.05rem;
            opacity: 0.95;
            margin-top: 34px;
            box-shadow: 0px -5px 32px #ff980022;
        }
        .footer-wrap {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }
        .footer-logo-img {
            width: 25px;
            height: 25px;
            border-radius: 7px;
            background: #fff2dc;
            object-fit: contain;
            border: 1.5px solid #ffa726;
            box-shadow: 0px 0.7px 5px #ffc10736;
        }
        .footer-rights {
            color: #aa6d00;
            font-size: 0.97rem;
            margin-left: 10px;
            text-align: center;
        }
        .footer .footer-company {
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            font-weight: 900;
            letter-spacing: 0.59px;
            font-size: 1.11rem;
            color: #ff9800;
        }
        #watermarkCanvas {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* Event end bouncer */
        #mainCard {
            transition: opacity 0.28s ease, transform 0.28s ease, filter 0.28s ease;
        }

        #eventEndedScreen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: rgba(2, 6, 23, 0.72);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #eventEndedScreen.open {
            opacity: 1;
            pointer-events: auto;
        }
        #eventEndedCard {
            width: 100%;
            max-width: 520px;
            background: rgba(30, 41, 59, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 34px 26px;
            text-align: center;
        }
        #eventEndedTitle {
            font-family: 'Urbanist', 'Segoe UI', sans-serif;
            font-weight: 900;
            font-size: 1.55rem;
            margin-bottom: 10px;
            letter-spacing: 0.2px;
            color: #f87171;
        }
        #eventEndedSub {
            color: #cbd5e1;
            font-weight: 700;
            line-height: 1.5;
            font-size: 1.02rem;
        }

        @media (max-width: 900px) {
            :root { --card-max-width: 430px; }
            .main-logo-area { margin-top: 52px; }
            .main-logo-title { font-size: 1.21rem; }
            html { font-size: 17px; }
        }
        @media (max-width: 650px) {
            :root {
                --card-max-width: 98vw;
                --logo-size: 49px;
                --btn-width: 98vw;
            }
            html { transform: scale(1); font-size: 16px; }
            .main-logo-area { margin-top: 34px; }
            .card { padding: 14px 2vw; }
            .main-logo-title { font-size: 1.13rem; }
            .main-logo-img { width: var(--logo-size); height: var(--logo-size); }
            .simple-btn, .contact-btn, .business-btn { width: 95vw; font-size: 1.05rem; }
            .file-chip { font-size: 0.98rem; max-width: 95vw; }
        }
        @media (max-width: 440px) {
            .footer { font-size: 0.99rem; padding: 8px 0 4px 0; }
            .card-description { font-size: 0.97rem; }
            .footer .footer-company { font-size: 1rem; }
            .btn-row { gap: 8px; }
        }
        @media (max-width: 380px) {
            .main-logo-area { margin-top: 8px; }
            .main-logo-title { font-size: 0.97rem; }
            .main-logo-img { width: 32px; height: 32px; }
            .footer-logo-img { width: 19px; height: 19px; }
            html { font-size: 13px; }
        }
    </style>
</head>
<body>
    <canvas id="watermarkCanvas" aria-hidden="true"></canvas>
    <main>
        <div class="main-logo-area">
            <img src="SNAPN.png" alt="SnapNexus Logo" class="main-logo-img" id="mainLogo">
            <div class="main-logo-title">SnapNexus</div>
        </div>

        <div class="card" id="mainCard">
            <div class="card-description">Soni Tech Solutions</div>
            <div class="event-pill" id="eventPill">Event: <span id="eventLabel">public</span></div>

            <div id="limitBanner">
                🚫 Limit reached! Ask the host to upgrade to Premium for unlimited uploads.
            </div>

            <div class="btn-row">
                <button type="button" class="simple-btn" id="simpleBtn" onclick="document.getElementById('p').click()">
                    Select Photo
                </button>
            </div>
            <input type="file" id="p" hidden accept="image/*">
            <div id="selectedFile"></div>
            <div id="status">System Online</div>

            <hr style="width: 100%; border: 0.5px solid #ff980022; margin: 20px 0;">
            <div id="gallery-container" style="width: 100%;">
                <h3 style="color: var(--fusion-c); font-size: 1rem; margin-bottom: 12px;">Recent Uplinks</h3>
                <div id="gallery-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-wrap">
            <img src="STS.png" alt="STS Parent Logo" class="footer-logo-img" id="footerLogo">
            <span class="footer-company">Soni Tech Solutions</span>
        </div>
        <div class="footer-rights">©2026 STS All rights reserved.</div>
    </footer>

    <div id="eventEndedScreen" aria-hidden="true">
        <div id="eventEndedCard">
            <div id="eventEndedTitle">Event Ended 🏁</div>
            <div id="eventEndedSub">This photo wall is now closed.</div>
        </div>
    </div>

    <script>
        /* ════════════════════════════════════════
           CONFIG — S_URL / S_KEY untouched
        ════════════════════════════════════════ */
        var S_URL = 'https://yaxajpojbssrrdcyuzeo.supabase.co';
        var S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheGFqcG9qYnNzcnJkY3l1emVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzYxMzMsImV4cCI6MjA5MDAxMjEzM30.-C0og62G8tIvl6CxmxOHpTq5l8FELn3WVQZHl43k20U';

        var STORAGE_BUCKET = 'events';
        var PHOTO_ROOT     = 'event-photos';

        var nexusClient = supabase.createClient(S_URL, S_KEY);

        var st               = document.getElementById('status');
        var fileInput        = document.getElementById('p');
        var selectedFileDiv  = document.getElementById('selectedFile');
        var simpleBtn        = document.getElementById('simpleBtn');
        var limitBanner      = document.getElementById('limitBanner');
        var eventLabel       = document.getElementById('eventLabel');
        var watermarkCanvas  = document.getElementById('watermarkCanvas');
        var mainCard         = document.getElementById('mainCard');
        var eventEndedScreen = document.getElementById('eventEndedScreen');

        function sanitizeEventId(raw) {
            if (!raw || typeof raw !== 'string') return 'public';
            var s = raw.trim().replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 64);
            return s || 'public';
        }
        var eventId = sanitizeEventId(new URLSearchParams(window.location.search).get('event') || 'public');
        eventLabel.textContent = eventId;

        function eventFolder() {
            return PHOTO_ROOT + '/' + eventId;
        }

        var eventIsPremium = false;
        var eventEnded     = false;

        mainCard.style.opacity       = '0';
        mainCard.style.transform     = 'scale(0.99)';
        mainCard.style.filter        = 'blur(4px)';
        mainCard.style.pointerEvents = 'none';

        function showUploadUI() {
            mainCard.style.opacity       = '1';
            mainCard.style.transform     = '';
            mainCard.style.filter        = '';
            mainCard.style.pointerEvents = 'auto';
        }

        function setEventEndedUI() {
            if (eventEnded) return;
            eventEnded = true;
            mainCard.style.opacity       = '0';
            mainCard.style.transform     = 'scale(0.99)';
            mainCard.style.filter        = 'blur(4px)';
            mainCard.style.pointerEvents = 'none';
            eventEndedScreen.classList.add('open');
            eventEndedScreen.setAttribute('aria-hidden', 'false');
            simpleBtn.disabled  = true;
            fileInput.disabled  = true;
        }

        async function getEventPhotoCount() {
            var res = await nexusClient.storage.from(STORAGE_BUCKET).list(eventFolder(), { limit: 1000 });
            if (res.error || !res.data) return 0;
            return res.data.filter(function (f) { return f.name && f.name.indexOf('.') !== -1; }).length;
        }

        async function checkUploadAllowed() {
            if (eventIsPremium) {
                limitBanner.classList.remove('show');
                simpleBtn.disabled  = false;
                simpleBtn.style.background = '';
                simpleBtn.innerText = 'Select Photo';
                return true;
            }
            var count = await getEventPhotoCount();
            if (count >= 20) {
                limitBanner.classList.add('show');
                simpleBtn.disabled = true;
                simpleBtn.style.background = '#94a3b8';
                simpleBtn.innerText = 'Limit Reached (20/20)';
                st.innerText = '';
                st.removeAttribute('success');
                st.removeAttribute('fail');
                return false;
            }
            limitBanner.classList.remove('show');
            simpleBtn.disabled  = false;
            simpleBtn.style.background = '';
            simpleBtn.innerText = 'Select Photo';
            return true;
        }

        function applyWatermarkToFile(file) {
            return new Promise(function (resolve, reject) {
                var img = new Image();
                var url = URL.createObjectURL(file);
                img.onload = function () {
                    try {
                        var w = img.naturalWidth, h = img.naturalHeight;
                        watermarkCanvas.width  = w;
                        watermarkCanvas.height = h;
                        var ctx = watermarkCanvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        var fontSize = Math.max(16, Math.round(w / 22));
                        ctx.font = 'bold ' + fontSize + "px 'Segoe UI', Urbanist, sans-serif";
                        var text = 'Powered by SnapNexus';
                        var pad  = Math.round(w * 0.025);
                        var tw   = ctx.measureText(text).width;
                        ctx.fillStyle   = 'rgba(255,255,255,0.5)';
                        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                        ctx.lineWidth   = Math.max(2, fontSize / 10);
                        ctx.strokeText(text, w - pad - tw, h - pad);
                        ctx.fillText(text,   w - pad - tw, h - pad);
                        watermarkCanvas.toBlob(function (blob) {
                            URL.revokeObjectURL(url);
                            if (!blob) { reject(new Error('Watermark failed')); return; }
                            var outName = file.name.replace(/\s/g, '_').replace(/\.[^.]+$/, '') + '_snapnexus.jpg';
                            resolve(new File([blob], outName, { type: 'image/jpeg', lastModified: Date.now() }));
                        }, 'image/jpeg', 0.9);
                    } catch (e) { URL.revokeObjectURL(url); reject(e); }
                };
                img.onerror = function () { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
                img.src = url;
            });
        }

        async function checkEventActiveOnce() {
            try {
                var res = await nexusClient
                    .from('events')
                    .select('is_active, is_premium')
                    .eq('event_code', eventId)
                    .maybeSingle();
                if (res && !res.error && res.data) {
                    eventIsPremium = !!res.data.is_premium;
                    if (res.data.is_active === false) {
                        setEventEndedUI();
                        return false;
                    }
                }
            } catch (e) { /* fail open */ }
            return true;
        }

        function subscribeToEventBouncer() {
            nexusClient
                .channel('event-bouncer-' + eventId)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'events',
                    filter: 'event_code=eq.' + eventId
                }, function (payload) {
                    if (!payload || !payload.new) return;
                    if (payload.new.is_active === false) setEventEndedUI();
                    if (typeof payload.new.is_premium === 'boolean') {
                        eventIsPremium = payload.new.is_premium;
                        checkUploadAllowed();
                    }
                })
                .subscribe();
        }

        async function loadGallery() {
            var grid = document.getElementById('gallery-grid');
            var res  = await nexusClient.storage.from(STORAGE_BUCKET).list(eventFolder(), {
                limit: 100,
                sortBy: { column: 'created_at', order: 'desc' }
            });
            if (res.error) { grid.innerHTML = ''; return; }
            var files = (res.data || []).filter(function (f) { return f.name && f.name.indexOf('.') !== -1; }).slice(0, 4);
            grid.innerHTML = '';
            files.forEach(function (file) {
                var path      = eventFolder() + '/' + file.name;
                var publicUrl = nexusClient.storage.from(STORAGE_BUCKET).getPublicUrl(path).data.publicUrl;
                grid.innerHTML +=
                    '<div style="position:relative">' +
                    '<img src="' + publicUrl + '" alt="" style="width:100%;height:80px;object-fit:cover;border-radius:10px;">' +
                    '<a href="' + publicUrl + '" download style="position:absolute;bottom:5px;right:5px;background:rgba(255,152,0,0.8);color:white;padding:2px 5px;border-radius:5px;font-size:10px;text-decoration:none;">📥</a>' +
                    '</div>';
            });
        }

        fileInput.onchange = async function (e) {
            if (eventEnded) { e.target.value = ''; return; }

            var allowed = await checkUploadAllowed();
            if (!allowed) { e.target.value = ''; return; }

            var file = e.target.files[0];
            selectedFileDiv.innerHTML = '';
            if (!file) {
                st.innerText = 'System Online';
                st.removeAttribute('success'); st.removeAttribute('fail');
                return;
            }

            var chip = document.createElement('div');
            chip.className   = 'file-chip';
            chip.textContent = file.name.length > 26 ? file.name.slice(0, 22) + '…' : file.name;
            selectedFileDiv.appendChild(chip);

            st.innerText = 'Uploading…';
            st.removeAttribute('fail'); st.removeAttribute('success');

            var uploadFile = file;
            if (!eventIsPremium) {
                try {
                    st.innerText = 'Applying watermark…';
                    uploadFile = await applyWatermarkToFile(file);
                } catch (err) {
                    alert('Could not process image: ' + (err && err.message ? err.message : String(err)));
                    st.innerText = '❌ Failed'; st.setAttribute('fail', ''); e.target.value = ''; return;
                }
            }

            var safeName = uploadFile.name.replace(/\s/g, '_');
            var path     = eventFolder() + '/' + Date.now() + '_' + safeName;

            var up = await nexusClient.storage.from(STORAGE_BUCKET).upload(path, uploadFile);
            e.target.value = '';

            if (up.error) {
                alert('Upload failed: ' + up.error.message);
                st.innerText = '❌ Failed'; st.setAttribute('fail', ''); st.removeAttribute('success');
            } else {
                alert('✅ Photo uploaded!');
                st.innerText = '✅ Uploaded!'; st.setAttribute('success', ''); st.removeAttribute('fail');
                setTimeout(function () { loadGallery(); checkUploadAllowed(); }, 600);
            }
        };

        (async function boot() {
            var active = await checkEventActiveOnce();
            if (!active) return;
            showUploadUI();
            subscribeToEventBouncer();
            await checkUploadAllowed();
            loadGallery();
            setInterval(async function () {
                if (eventEnded) return;
                await checkEventActiveOnce();
                checkUploadAllowed();
            }, 30000);
        })();
    </script>
</body>
</html>
