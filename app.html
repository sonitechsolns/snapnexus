<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNexus | Guest Upload</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui; background:#020617; color:#fff; padding:20px; }
        .card { background:rgba(20,30,55,0.45); backdrop-filter:blur(16px); border-radius:24px; padding:30px; max-width:500px; margin:0 auto; text-align:center; }
        button { background:#3b82f6; color:white; border:none; padding:14px 24px; border-radius:40px; font-weight:bold; cursor:pointer; margin:20px 0; width:100%; }
        .gallery { display:grid; grid-template-columns:repeat(auto-fill, minmax(100px,1fr)); gap:12px; margin-top:20px; }
        .gallery img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:12px; }
        .status { margin:10px 0; color:#94a3b8; }
    </style>
</head>
<body>
<div class="card">
    <h2>SnapNexus</h2>
    <div id="eventDisplay">Event: <span id="eventIdSpan">loading...</span></div>
    <button id="uploadBtn">Select Photo</button>
    <input type="file" id="fileInput" hidden accept="image/*">
    <div id="status" class="status">Ready</div>
    <div id="gallery" class="gallery"></div>
</div>

<script>
    // Appwrite config
    const PROJECT_ID = '69d8eda100264f4e42ae';
    const BUCKET_ID = '69d8f2b800397ad57e50';
    const client = new Appwrite.Client()
        .setEndpoint('https://cloud.appwrite.io/v1')
        .setProject(PROJECT_ID);
    const storage = new Appwrite.Storage(client);
    
    // Get event from URL
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('event') || 'test123';
    document.getElementById('eventIdSpan').innerText = eventId;
    
    // Short prefix for fileId (first 8 chars)
    const shortPrefix = eventId.substring(0, 8);
    
    async function loadGallery() {
        try {
            // List ALL files (no prefix filter for debugging)
            const result = await storage.listFiles(BUCKET_ID);
            const files = result.files || [];
            const gallery = document.getElementById('gallery');
            if (files.length === 0) {
                gallery.innerHTML = '<div>No photos yet</div>';
                return;
            }
            let html = '';
            for (const file of files) {
                const url = storage.getFileView(BUCKET_ID, file.$id);
                html += `<img src="${url}" alt="photo" loading="lazy">`;
            }
            gallery.innerHTML = html;
        } catch(err) {
            console.error('Gallery error:', err);
            document.getElementById('gallery').innerHTML = '<div>Error loading photos</div>';
        }
    }
    
    document.getElementById('uploadBtn').onclick = () => document.getElementById('fileInput').click();
    
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = 'Uploading...';
        
        // Create a short fileId (prefix + timestamp + random)
        const timestamp = Date.now().toString().slice(-8);
        const random = Math.random().toString(36).substring(2, 6);
        const fileId = `${shortPrefix}_${timestamp}_${random}`;
        
        try {
            await storage.createFile(BUCKET_ID, fileId, file);
            statusDiv.innerText = 'Uploaded!';
            loadGallery(); // refresh gallery
            setTimeout(() => statusDiv.innerText = 'Ready', 2000);
        } catch(err) {
            statusDiv.innerText = 'Upload failed: ' + err.message;
            console.error(err);
        }
        e.target.value = '';
    };
    
    loadGallery();
    setInterval(loadGallery, 5000);
</script>
</body>
</html>
