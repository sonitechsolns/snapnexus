<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SnapNexus | Guest Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fusion-a: #ff9800;
            --fusion-b: #ffec43;
            --fusion-c: #ff7200;
            --logo-size: 68px;
            --card-max-width: 400px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Urbanist', sans-serif;
            background: linear-gradient(140deg, var(--fusion-a) 0%, var(--fusion-b) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .main-logo-area { text-align: center; margin-bottom: 20px; }
        .main-logo-img {
            width: var(--logo-size);
            height: var(--logo-size);
            object-fit: contain;
            border-radius: 17px;
            background: #fff6eb;
            border: 2.5px solid var(--fusion-c);
            box-shadow: 0 2.5px 8px #ff98005c;
        }
        .main-logo-title {
            font-size: 1.55rem;
            font-weight: 900;
            color: var(--fusion-c);
            margin-top: 12px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: var(--card-max-width);
            text-align: center;
        }
        .event-pill {
            background: #fff3e0;
            padding: 6px 16px;
            border-radius: 999px;
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--fusion-c);
            margin-bottom: 20px;
        }
        .simple-btn {
            background: var(--fusion-a);
            color: white;
            border: none;
            padding: 16px 0;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(255,152,0,0.3);
            transition: 0.2s;
        }
        .simple-btn:active { transform: scale(0.98); }
        #status {
            margin-top: 16px;
            font-weight: 700;
            color: #ad640b;
            min-height: 24px;
        }
        #gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }
        .gallery-img {
            width: 100%;
            border-radius: 12px;
            height: 90px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #fff;
            text-align: center;
            font-weight: 700;
        }
        hr { margin: 20px 0; border: 0.5px solid #ff980055; }
    </style>
</head>
<body>
    <div class="main-logo-area">
        <img src="SNAPN.png" alt="SnapNexus Logo" class="main-logo-img">
        <div class="main-logo-title">SnapNexus</div>
    </div>

    <div class="card">
        <div class="event-pill">📸 Guest Upload Portal</div>

        <button class="simple-btn" id="uploadBtn">SELECT PHOTO</button>
        <input type="file" id="fileInput" hidden accept="image/*">

        <div id="status">Ready</div>

        <hr>
        <h4 style="color: var(--fusion-c); font-size: 0.9rem;">Recent Uploads</h4>
        <div id="gallery-grid"></div>
    </div>
    <div class="footer">Powered by SnapNexus · Local Mobile Database</div>

    <script>
        // Use the tunnel URL currently active in your Termux session
        const API_BASE = 'https://outsourcing-joe-cookies-demanding.trycloudflare.com';

        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');
        const galleryGrid = document.getElementById('gallery-grid');

        // Fetch and display photos from the Huawei Phone
        async function loadGallery() {
            try {
                const res = await fetch(`${API_BASE}/photos`);
                if (!res.ok) throw new Error('Phone server unreachable');
                const photos = await res.json();
                
                // Show last 4 uploads, newest first. Construct full URL using API_BASE.
                const recent = photos.slice(-4).reverse(); 
                galleryGrid.innerHTML = recent.map(photo => 
                    `<img src="${API_BASE}${photo.url}" class="gallery-img" alt="upload">`
                ).join('');
            } catch (err) {
                console.error('Gallery error:', err);
                galleryGrid.innerHTML = '<p style="color:#d32f2f; font-size:0.8rem;">Huawei Server Offline</p>';
            }
        }

        // Upload directly to the Termux Node.js server
        async function uploadPhoto(file) {
            const formData = new FormData();
            formData.append('photo', file);

            statusDiv.innerText = 'Sending to Huawei...';
            statusDiv.style.color = '#ad640b';

            try {
                const res = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) throw new Error('Upload rejected');

                statusDiv.innerText = '✅ Saved to Phone!';
                statusDiv.style.color = '#2e7d32';
                
                await loadGallery(); // Refresh the thumbnails

                setTimeout(() => {
                    statusDiv.innerText = 'Ready';
                    statusDiv.style.color = '#ad640b';
                }, 3000);
            } catch (err) {
                statusDiv.innerText = '❌ Failed (Check Tunnel)';
                statusDiv.style.color = '#d32f2f';
            }
        }

        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            await uploadPhoto(file);
            fileInput.value = ''; 
        });

        // Initial Load
        loadGallery();
        // Check for new photos every 10 seconds
        setInterval(loadGallery, 10000);
    </script>
</body>
</html>
