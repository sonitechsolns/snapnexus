<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNexus | Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#020617; color:white; font-family:system-ui; padding:20px; }
        .card { background:rgba(20,30,55,0.45); backdrop-filter:blur(16px); border-radius:24px; padding:24px; margin-bottom:20px; }
        .gallery { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:16px; margin-top:20px; }
        .photo { position:relative; aspect-ratio:1; border-radius:16px; overflow:hidden; }
        .photo img { width:100%; height:100%; object-fit:cover; }
        .delete-btn { position:absolute; bottom:8px; right:8px; background:rgba(239,68,68,0.9); border:none; color:white; padding:6px 12px; border-radius:20px; cursor:pointer; font-size:12px; }
        button { background:#3b82f6; color:white; border:none; padding:10px 20px; border-radius:40px; cursor:pointer; margin-right:10px; }
        .btn-danger { background:#ef4444; }
        .stats { display:flex; gap:20px; margin-bottom:20px; }
        .stat { background:rgba(0,0,0,0.3); padding:16px; border-radius:16px; text-align:center; flex:1; }
    </style>
</head>
<body>
<div class="card">
    <h2 id="eventName">Loading event...</h2>
    <div class="stats">
        <div class="stat"><div id="photoCount">0</div><div>Photos</div></div>
        <div class="stat"><div id="storageUsed">0 MB</div><div>Storage</div></div>
    </div>
    <div>
        <button id="refreshBtn">Refresh</button>
        <button id="endEventBtn" class="btn-danger">End Event</button>
    </div>
    <div id="gallery" class="gallery"></div>
</div>

<script>
    const PROJECT_ID = '69d8eda100264f4e42ae';
    const BUCKET_ID = '69d8f2b800397ad57e50';
    const DB_ID = '69d8f0b0003c6d1e4d93';
    const COLLECTION_ID = 'EventsTable';
    const client = new Appwrite.Client()
        .setEndpoint('https://cloud.appwrite.io/v1')
        .setProject(PROJECT_ID);
    const storage = new Appwrite.Storage(client);
    const databases = new Appwrite.Databases(client);
    
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('event');
    if (!eventId) {
        alert('No event selected. Create one from login.');
        window.location.href = 'login.html';
    }
    
    let currentEvent = null;
    
    async function loadEvent() {
        try {
            const res = await databases.listDocuments(DB_ID, COLLECTION_ID, [
                Appwrite.Query.equal('eventId', eventId)
            ]);
            if (res.documents.length === 0) throw new Error('Event not found');
            currentEvent = res.documents[0];
            document.getElementById('eventName').innerHTML = `${currentEvent.eventName} <span style="color:#60a5fa;">#LiveWall</span>`;
            if (currentEvent.status === 'ended') {
                document.getElementById('endEventBtn').disabled = true;
                document.getElementById('endEventBtn').innerText = 'Event Ended';
            }
        } catch(err) {
            console.error(err);
            document.getElementById('eventName').innerText = 'Event not found';
        }
    }
    
    async function loadGallery() {
        try {
            const result = await storage.listFiles(BUCKET_ID);
            const files = result.files || [];
            document.getElementById('photoCount').innerText = files.length;
            const totalSize = files.reduce((s,f) => s + (f.sizeOriginal||0), 0);
            document.getElementById('storageUsed').innerText = (totalSize / (1024*1024)).toFixed(1) + ' MB';
            const gallery = document.getElementById('gallery');
            if (files.length === 0) {
                gallery.innerHTML = '<div>No photos uploaded yet</div>';
                return;
            }
            let html = '';
            for (const file of files) {
                const url = storage.getFileView(BUCKET_ID, file.$id);
                html += `
                    <div class="photo">
                        <img src="${url}" alt="photo">
                        <button class="delete-btn" data-id="${file.$id}">Delete</button>
                    </div>
                `;
            }
            gallery.innerHTML = html;
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (confirm('Delete this photo?')) {
                        await storage.deleteFile(BUCKET_ID, btn.getAttribute('data-id'));
                        loadGallery();
                    }
                };
            });
        } catch(err) {
            console.error(err);
        }
    }
    
    document.getElementById('refreshBtn').onclick = () => loadGallery();
    document.getElementById('endEventBtn').onclick = async () => {
        if (!currentEvent || currentEvent.status === 'ended') return;
        if (!confirm('End this event? No more uploads allowed.')) return;
        try {
            await databases.updateDocument(DB_ID, COLLECTION_ID, currentEvent.$id, { status: 'ended' });
            alert('Event ended');
            location.reload();
        } catch(err) {
            alert('Error: ' + err.message);
        }
    };
    
    loadEvent();
    loadGallery();
    setInterval(loadGallery, 10000);
</script>
</body>
</html>
