<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNexus | Host Dashboard</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --muted: #94a3b8;
            --fusion-a: #ff9800;
            --fusion-c: #ff7200;
            --glass: rgba(30, 41, 59, 0.55);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Urbanist', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .state-shell { display: none; min-height: 100vh; animation: stateIn 0.45s ease; }
        .state-shell.is-active { display: flex; }
        @keyframes stateIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #state-auth, #state-create {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        #state-dashboard { flex-direction: column; }

        .glass-card {
            width: 100%;
            max-width: 420px;
            padding: 36px 28px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        .glass-card h1 { font-size: 1.55rem; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.02em; }
        .glass-card .lead { color: var(--muted); font-weight: 600; font-size: 0.95rem; margin-bottom: 24px; }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15,23,42,0.65);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 18px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: rgba(255,152,0,0.45);
            box-shadow: 0 0 0 3px rgba(255,152,0,0.12);
        }

        .btn-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }

        .btn-primary {
            flex: 1;
            min-width: 120px;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 900;
            font-size: 0.98rem;
            cursor: pointer;
            color: #1a0f00;
            background: linear-gradient(135deg, var(--fusion-a) 0%, var(--fusion-c) 100%);
            box-shadow: 0 6px 28px rgba(255,152,0,0.3);
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(255,152,0,0.4); }
        .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        .btn-secondary {
            flex: 1;
            min-width: 120px;
            padding: 14px 20px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-family: inherit;
            font-weight: 800;
            font-size: 0.98rem;
            cursor: pointer;
            color: var(--text);
            background: rgba(255,255,255,0.06);
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,152,0,0.35); }

        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(12px);
        }
        .dash-brand { display: flex; align-items: center; gap: 12px; }
        .dash-brand img { width: 44px; height: 44px; object-fit: contain; border-radius: 10px; border: 2px solid rgba(255,152,0,0.35); }
        .dash-brand span {
            font-weight: 900;
            font-size: 1.25rem;
            background: linear-gradient(135deg, var(--fusion-a), var(--fusion-c));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn-logout {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            font-family: inherit;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        .btn-logout:hover { color: var(--text); border-color: rgba(248,113,113,0.4); }

        .dash-main { flex: 1; padding: 28px 22px 40px; max-width: 1200px; width: 100%; margin: 0 auto; }
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 22px; }

        .dash-card {
            padding: 24px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .dash-card h2 { font-size: 1.1rem; font-weight: 900; margin-bottom: 16px; letter-spacing: -0.01em; }

        .qr-wrap { text-align: center; margin-bottom: 18px; }
        .qr-wrap img { max-width: 100%; height: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); }

        .link-list { display: flex; flex-direction: column; gap: 10px; }
        .link-list a {
            color: var(--fusion-a);
            font-weight: 700;
            text-decoration: none;
            word-break: break-all;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(255,152,0,0.08);
            border: 1px solid rgba(255,152,0,0.15);
            transition: background 0.2s;
        }
        .link-list a:hover { background: rgba(255,152,0,0.14); }

        .plan-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 13px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 900;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .plan-tag.is-free { color: var(--muted); background: rgba(255,255,255,0.05); }
        .plan-tag.is-premium { color: #6ee7b7; background: rgba(16,185,129,0.1); border-color: rgba(52,211,153,0.45); }
        .plan-tag.is-ended { color: #f87171; background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.45); }

        .pricing-box {
            border: 1px solid rgba(255,152,0,0.22);
            border-radius: 14px;
            padding: 18px 16px;
            background: rgba(255,152,0,0.04);
            margin-bottom: 14px;
        }
        .pricing-box .price-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 12px;
        }
        .pricing-box .price-amount {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--fusion-a), var(--fusion-c));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .pricing-box .price-sub { color: var(--muted); font-size: 0.88rem; font-weight: 700; }
        .pricing-box .feature-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .pricing-box .feature-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #cbd5e1;
        }
        .pricing-box .feature-list li::before {
            content: '';
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--fusion-a), var(--fusion-c));
            flex-shrink: 0;
        }

        .btn-upgrade {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 900;
            font-size: 0.95rem;
            cursor: pointer;
            color: #1a0f00;
            background: linear-gradient(135deg, var(--fusion-a) 0%, var(--fusion-c) 100%);
            box-shadow: 0 0 28px rgba(255,152,0,0.35), 0 6px 24px rgba(255,114,0,0.2);
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .btn-upgrade:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(255,152,0,0.45), 0 10px 32px rgba(255,114,0,0.25); }
        .btn-upgrade:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .btn-end {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 900;
            font-size: 0.95rem;
            cursor: pointer;
            color: #f87171;
            background: rgba(248,113,113,0.05);
            border: 1px solid rgba(248,113,113,0.6);
            box-shadow: 0 8px 28px rgba(248,113,113,0.12);
            transition: background 0.2s, border-color 0.2s, transform 0.15s, opacity 0.2s;
        }
        .btn-end:hover:not(:disabled) { background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.85); transform: translateY(-2px); }
        .btn-end:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .stat-big {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--fusion-a), var(--fusion-c));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stat-label { color: var(--muted); font-weight: 600; font-size: 0.92rem; margin-top: 6px; }

        .hint { font-size: 0.82rem; color: var(--muted); margin-top: 12px; font-weight: 600; }

        .event-item {
            background: rgba(30,41,59,0.7);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .event-code {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--fusion-a);
        }
        .event-status {
            font-size: 0.85rem;
            margin: 8px 0;
        }
        .event-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 800;
        }
        .btn-end-sm {
            background: rgba(248,113,113,0.2);
            color: #f87171;
            border: 1px solid rgba(248,113,113,0.5);
        }
        .btn-end-sm:hover { background: rgba(248,113,113,0.4); }
        .btn-copy {
            background: rgba(255,152,0,0.2);
            color: var(--fusion-a);
        }
        .create-event-card {
            background: linear-gradient(135deg, rgba(255,152,0,0.1), rgba(255,114,0,0.05));
            border: 1px dashed var(--fusion-a);
            cursor: pointer;
            transition: 0.2s;
        }
        .create-event-card:hover {
            background: rgba(255,152,0,0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 520px) {
            .btn-row { flex-direction: column; }
            .btn-primary, .btn-secondary { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="state-auth" class="state-shell" aria-hidden="true">
        <div class="glass-card">
            <h1>Host Dashboard</h1>
            <p class="lead">Sign in to manage your SnapNexus events.</p>
            <label for="authEmail">Email</label>
            <input type="email" id="authEmail" autocomplete="email" placeholder="you@example.com">
            <label for="authPassword">Password</label>
            <input type="password" id="authPassword" autocomplete="current-password" placeholder="••••••••">
            <div class="btn-row">
                <button type="button" class="btn-primary" id="btnLogin">Login</button>
                <button type="button" class="btn-secondary" id="btnSignUp">Create Account</button>
            </div>
            <p class="hint">New hosts can create an account — check your email if confirmation is required.</p>
        </div>
    </div>

    <div id="state-dashboard" class="state-shell" aria-hidden="true">
        <header class="dash-header">
            <div class="dash-brand">
                <img src="SNAPN.png" alt="SnapNexus" width="44" height="44">
                <div>
                    <span id="brandLabel">SnapNexus</span>
                    <span id="headerTierBadge" style="display:none;margin-left:8px;font-size:0.8rem;font-weight:800;padding:3px 10px;border-radius:999px;background:rgba(16,185,129,0.15);border:1px solid rgba(52,211,153,0.4);color:#6ee7b7;vertical-align:middle;"></span>
                </div>
            </div>
            <button type="button" class="btn-logout" id="btnLogout">Logout</button>
        </header>

        <main class="dash-main">
            <div class="dash-grid" id="eventsGrid">
                <!-- Events will be injected here -->
            </div>
        </main>
    </div>

    <script>
        var S_URL = 'https://yaxajpojbssrrdcyuzeo.supabase.co';
        var S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheGFqcG9qYnNzcnJkY3l1emVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzYxMzMsImV4cCI6MjA5MDAxMjEzM30.-C0og62G8tIvl6CxmxOHpTq5l8FELn3WVQZHl43k20U';
        var SITE_URL = 'https://snapnexus-jet.vercel.app';

        var sb = supabase.createClient(S_URL, S_KEY);

        var stateAuth = document.getElementById('state-auth');
        var stateDashboard = document.getElementById('state-dashboard');
        var authEmail = document.getElementById('authEmail');
        var authPassword = document.getElementById('authPassword');
        var btnLogin = document.getElementById('btnLogin');
        var btnSignUp = document.getElementById('btnSignUp');
        var btnLogout = document.getElementById('btnLogout');
        var eventsGrid = document.getElementById('eventsGrid');
        var headerTierBadge = document.getElementById('headerTierBadge');

        var currentUser = null;
        var userTier = 'free'; // free, pro, premium, season

        function showState(which) {
            stateAuth.classList.toggle('is-active', which === 'auth');
            stateDashboard.classList.toggle('is-active', which === 'dashboard');
        }

        async function getUserProfile(email) {
            let { data, error } = await sb.from('profiles').select('tier').eq('email', email).maybeSingle();
            if (error || !data) {
                // Create default profile
                await sb.from('profiles').insert({ email: email, tier: 'free' });
                return 'free';
            }
            return data.tier;
        }

        async function loadEvents() {
            if (!currentUser) return;
            let { data, error } = await sb.from('events').select('*').eq('host_email', currentUser.email).order('created_at', { ascending: false });
            if (error) return;
            renderEvents(data);
        }

        function getMaxActiveEvents() {
            if (userTier === 'season') return Infinity;
            if (userTier === 'premium') return 7;
            return 1; // free and pro both limited to 1 active event
        }

        async function renderEvents(events) {
            let activeCount = events.filter(e => e.is_active).length;
            let maxActive = getMaxActiveEvents();
            let canCreate = activeCount < maxActive;

            let html = `<div class="dash-card create-event-card" id="createEventCard">
                            <h2>+ Create New Event</h2>
                            <p style="color:var(--muted); margin-top:8px;">${canCreate ? 'Click to start a new event' : `You have reached the limit of ${maxActive === Infinity ? 'unlimited' : maxActive} active event${maxActive !== 1 ? 's' : ''}. End an existing event first.`}</p>
                        </div>`;

            for (let ev of events) {
                let status = ev.is_active ? '🟢 Active' : '🔴 Ended';
                let badgeClass = ev.is_premium ? 'is-premium' : 'is-free';
                let badgeText = ev.is_premium ? '👑 Premium' : 'Free Tier';
                let guestUrl = `${SITE_URL}/app.html?event=${encodeURIComponent(ev.event_code)}`;
                let tvUrl = `${SITE_URL}/tv.html?event=${encodeURIComponent(ev.event_code)}`;
                html += `
                    <div class="dash-card">
                        <div class="plan-tag ${badgeClass}">${badgeText}</div>
                        <div class="event-code">📌 ${ev.event_code}</div>
                        <div class="event-status">${status}</div>
                        <div class="link-list">
                            <a href="${guestUrl}" target="_blank">Guest Upload Portal</a>
                            <a href="${tvUrl}" target="_blank">TV Display Screen</a>
                        </div>
                        <div class="event-actions">
                            <button class="btn-sm btn-end-sm" data-code="${ev.event_code}" data-active="${ev.is_active}">${ev.is_active ? 'End Event' : 'Event Ended'}</button>
                            <button class="btn-sm btn-copy" data-url="${guestUrl}">Copy Guest URL</button>
                        </div>
                    </div>`;
            }
            eventsGrid.innerHTML = html;

            document.getElementById('createEventCard')?.addEventListener('click', async () => {
                if (!canCreate) {
                    alert(`You have reached your active event limit (${maxActive === Infinity ? 'unlimited' : maxActive}). Please end an event before creating a new one.`);
                    return;
                }
                let code = prompt('Enter a unique event code (letters, numbers, underscores only):');
                if (!code) return;
                if (!/^[a-z0-9_]+$/.test(code)) {
                    alert('Use only lowercase letters, numbers, underscores.');
                    return;
                }
                let { error } = await sb.from('events').insert({
                    host_email: currentUser.email,
                    event_code: code,
                    is_premium: false,
                    is_active: true
                });
                if (error) alert(error.message || 'Event code already exists.');
                else loadEvents();
            });

            document.querySelectorAll('.btn-end-sm').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    let code = btn.getAttribute('data-code');
                    let isActive = btn.getAttribute('data-active') === 'true';
                    if (!isActive) return;
                    if (!confirm(`End event "${code}"? Guests will no longer be able to upload.`)) return;
                    await sb.from('events').update({ is_active: false }).eq('event_code', code);
                    loadEvents();
                });
            });

            document.querySelectorAll('.btn-copy').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    let url = btn.getAttribute('data-url');
                    navigator.clipboard.writeText(url);
                    alert('Guest URL copied!');
                });
            });
        }

        async function routeAfterSession() {
            let session = (await sb.auth.getSession()).data.session;
            if (!session) { showState('auth'); return; }
            currentUser = session.user;
            userTier = await getUserProfile(currentUser.email);
            headerTierBadge.style.display = 'inline-block';
            headerTierBadge.textContent = userTier === 'season' ? '🏆 Season Pass' : (userTier === 'premium' ? '👑 Premium' : (userTier === 'pro' ? '⭐ Pro' : '✨ Free'));
            await loadEvents();
            showState('dashboard');
        }

        btnLogin.addEventListener('click', async () => {
            let email = authEmail.value.trim(), password = authPassword.value;
            if (!email || !password) { alert('Enter email and password'); return; }
            btnLogin.disabled = true;
            let { error } = await sb.auth.signInWithPassword({ email, password });
            btnLogin.disabled = false;
            if (error) { alert(error.message); return; }
            routeAfterSession();
        });

        btnSignUp.addEventListener('click', async () => {
            let email = authEmail.value.trim(), password = authPassword.value;
            if (!email || !password) { alert('Enter email and password'); return; }
            if (password.length < 6) { alert('Password min 6 chars'); return; }
            btnSignUp.disabled = true;
            let { error } = await sb.auth.signUp({ email, password });
            btnSignUp.disabled = false;
            if (error) { alert(error.message); return; }
            alert('Check your email to confirm. After confirmation, log in.');
        });

        btnLogout.addEventListener('click', async () => {
            await sb.auth.signOut();
            currentUser = null;
            showState('auth');
        });

        sb.auth.onAuthStateChange((_, session) => {
            if (!session) { currentUser = null; showState('auth'); }
        });

        routeAfterSession();

        // Coming Soon gatekeeper for any upgrade button (if present in future)
        document.body.addEventListener('click', (e) => {
            if (e.target.classList && e.target.classList.contains('btn-upgrade')) {
                e.preventDefault();
                alert('Coming Soon! But you can still register and use the Free Tier right now!');
            }
        });
    </script>
</body>
</html>
