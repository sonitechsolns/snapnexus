<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNexus | Host Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Urbanist:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Urbanist', sans-serif; background: #020617; color: #ffffff; min-height: 100vh; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Syne', sans-serif; }

        .liquid-mesh { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; background: radial-gradient(circle at 0% 100%, #020617, #1e3a8a 30%, #3b82f6 65%, #4f46e5); background-size: 200% 200%; animation: liquidShift 16s ease infinite alternate; }
        @keyframes liquidShift { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -2; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E"); opacity: 0.4; }

        .glass-card { background: rgba(20, 30, 55, 0.45); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px; padding: 24px; }
        
        .topbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(2,6,23,0.7); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 100; }
        .topbar-logo { display: flex; align-items: center; gap: 12px; font-family: 'Syne'; font-size: 1.4rem; font-weight: 800; }
        
        .dashboard-container { padding: 40px; max-width: 1400px; margin: 0 auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .stat-card { display: flex; align-items: center; gap: 20px; }
        .stat-icon { width: 56px; height: 56px; border-radius: 16px; background: rgba(59,130,246,0.15); display: flex; align-items: center; justify-content: center; color: #60a5fa; }
        .stat-value { font-size: 2rem; font-family: 'Syne'; font-weight: 800; }
        .stat-label { color: #94a3b8; font-weight: 600; font-size: 0.9rem; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .btn-physics { padding: 12px 24px; font-weight: 700; border-radius: 40px; border: none; cursor: pointer; background: linear-gradient(105deg, #3b82f6, #4f46e5); color: white; display: inline-flex; align-items: center; gap: 8px; transition: transform 0.1s; }
        .btn-physics:active { transform: scale(0.95); }
        .btn-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.3); }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .photo-card { position: relative; border-radius: 16px; overflow: hidden; aspect-ratio: 1; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .photo-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; backdrop-filter: blur(4px); }
        .photo-card:hover .photo-overlay { opacity: 1; }
        .photo-card:hover img { transform: scale(1.05); }
        .remove-btn { background: rgba(239, 68, 68, 0.85); color: white; border: 1px solid rgba(239, 68, 68, 0.4); padding: 8px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; font-family: 'Urbanist', sans-serif; }
        .remove-btn:hover { background: #ef4444; transform: scale(1.05); }
        .empty-gallery { text-align: center; padding: 60px 20px; color: #94a3b8; font-weight: 600; }
        .empty-gallery i { width: 48px; height: 48px; margin-bottom: 16px; color: #60a5fa; }

        .event-ended-message { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 24px; padding: 40px; text-align: center; margin: 40px 0; }
        .event-ended-message h3 { color: #f87171; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="liquid-mesh"></div>
    <div class="noise-overlay"></div>

    <div class="topbar">
        <div class="topbar-logo">
            <div style="width: 36px; height: 36px; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); border-radius: 8px; display:flex; align-items:center; justify-content:center;"><i data-lucide="layout-dashboard" style="color: #60a5fa; width: 20px;"></i></div>
            Host Dashboard
        </div>
        <div style="display:flex; gap: 16px; align-items: center;">
            <a href="login.html" id="myEventsLink" style="color: #94a3b8; text-decoration: none; font-weight: 600;"><i data-lucide="calendar"></i> My Events</a>
            <a id="liveWallLink" href="#" target="_blank" style="text-decoration: none;">
                <span style="background: rgba(16,185,129,0.2); color: #34d399; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; display:flex; align-items:center; gap:6px;"><i data-lucide="radio" style="width:14px;"></i> Wall is LIVE</span>
            </a>
            <button id="logoutBtn" style="background: none; border: none; color: #94a3b8; cursor: pointer;"><i data-lucide="log-out"></i></button>
        </div>
    </div>

    <div class="dashboard-container">
        <h2 id="eventNameHeading" style="margin-bottom: 32px; font-size: 2.2rem;" data-aos="fade-right">Loading event...</h2>

        <div class="stats-grid" data-aos="fade-up">
            <div class="glass-card stat-card">
                <div class="stat-icon"><i data-lucide="image"></i></div>
                <div>
                    <div class="stat-value" id="photoCount">0</div>
                    <div class="stat-label">Photos Uploaded</div>
                </div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-icon"><i data-lucide="users"></i></div>
                <div>
                    <div class="stat-value" id="guestCount">0</div>
                    <div class="stat-label">Active Guests</div>
                </div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-icon"><i data-lucide="database"></i></div>
                <div>
                    <div class="stat-value" id="storageUsed">0 MB</div>
                    <div class="stat-label">Storage Used</div>
                </div>
            </div>
        </div>

        <div id="eventContent">
            <div class="glass-card" data-aos="fade-up" data-aos-delay="100">
                <div class="toolbar">
                    <h3 style="font-size: 1.5rem;">Event Controls</h3>
                    <div style="display:flex; gap:12px; flex-wrap: wrap;">
                        <button class="btn-physics" id="printQrBtn"><i data-lucide="qr-code"></i> Print QR</button>
                        <button class="btn-physics" id="viewGuestAppBtn"><i data-lucide="smartphone"></i> View Guest App</button>
                        <button class="btn-physics" id="downloadZipBtn"><i data-lucide="download"></i> Download ZIP</button>
                        <button class="btn-physics btn-danger" id="endEventBtn"><i data-lucide="power"></i> End Event</button>
                    </div>
                </div>

                <div id="galleryContainer" class="gallery-grid">
                    <div class="empty-gallery">
                        <i data-lucide="camera-off"></i>
                        <p>No photos uploaded yet.<br>Share the QR code with your guests.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        lucide.createIcons();
        AOS.init();

        const { Client, Account, Storage, Databases, Query } = Appwrite;
        const PROJ_ID = '69d8eda100264f4e42ae';
        const BKT_ID = '69d8f2b800397ad57e50';
        const DB_ID = '69d8f0b0003c6d1e4d93';
        const EVENTS_TABLE = 'EventsTable';

        const client = new Client()
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject(PROJ_ID);
        const account = new Account(client);
        const storage = new Storage(client);
        const databases = new Databases(client);

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event');
        if (!eventId) {
            alert('No event selected. Redirecting to login.');
            window.location.href = 'login.html';
        }

        let currentEvent = null;
        let currentUser = null;

        // Helper: generate same prefix as in app.html
        function getEventPrefix(eventId) {
            let rawPrefix = eventId.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
            if (!rawPrefix.match(/^[a-zA-Z]/)) rawPrefix = 'e' + rawPrefix;
            return rawPrefix.substring(0, 6) + '_';
        }

        // Auth check
        async function checkAuth() {
            try {
                currentUser = await account.get();
            } catch (err) {
                window.location.href = 'login.html';
            }
        }

        async function loadEventDetails() {
            try {
                const response = await databases.listDocuments(DB_ID, EVENTS_TABLE, [
                    Query.equal('eventId', eventId)
                ]);
                if (response.documents.length === 0) throw new Error('Event not found');
                currentEvent = response.documents[0];
                headingEl.innerHTML = `${currentEvent.eventName} <span style="color:#60a5fa;">#LiveWall</span>`;
                
                // Check if event is ended
                if (currentEvent.status === 'ended') {
                    document.getElementById('eventContent').innerHTML = `
                        <div class="event-ended-message">
                            <h3><i data-lucide="flag"></i> This event has ended</h3>
                            <p style="color:#94a3b8;">No more uploads are accepted. You can still download existing photos.</p>
                            <button id="downloadZipBtnEnded" class="btn-physics" style="margin-top: 20px;"><i data-lucide="download"></i> Download All Photos</button>
                        </div>
                    `;
                    lucide.createIcons();
                    document.getElementById('downloadZipBtnEnded')?.addEventListener('click', () => downloadAllPhotos());
                    return;
                }
                
                const tier = currentEvent.tier;
                const tvPage = (tier === 'pro' || tier === 'premium' || tier === 'vip') ? 'tv_2.html' : 'tv.html';
                const liveWallLink = document.getElementById('liveWallLink');
                if (liveWallLink) {
                    liveWallLink.href = `${window.location.origin}/${tvPage}?event=${eventId}`;
                }
            } catch (err) {
                console.error(err);
                headingEl.innerHTML = 'Event not found';
            }
        }

        const headingEl = document.getElementById('eventNameHeading');
        const galleryContainer = document.getElementById('galleryContainer');

        async function updateStats() {
            try {
                const prefix = getEventPrefix(eventId);
                const response = await storage.listFiles(BKT_ID, { prefix: prefix });
                const files = response.files || [];
                document.getElementById('photoCount').innerText = files.length;
                const totalSize = files.reduce((sum, f) => sum + (f.sizeOriginal || 0), 0);
                document.getElementById('storageUsed').innerText = (totalSize / (1024 * 1024)).toFixed(1) + ' MB';
                document.getElementById('guestCount').innerText = '—';
            } catch (err) {
                console.error("Stats error:", err);
            }
        }

        async function loadGallery() {
            try {
                const prefix = getEventPrefix(eventId);
                const response = await storage.listFiles(BKT_ID, { prefix: prefix });
                const files = response.files || [];
                if (files.length === 0) {
                    galleryContainer.innerHTML = `<div class="empty-gallery"><i data-lucide="camera-off"></i><p>No photos uploaded yet.<br>Share the QR code with your guests.</p></div>`;
                    lucide.createIcons();
                    return;
                }
                let html = '';
                for (const file of files) {
                    const fileUrl = storage.getFileView(BKT_ID, file.$id);
                    html += `
                        <div class="photo-card" data-file-id="${file.$id}">
                            <img src="${fileUrl}" alt="Guest photo">
                            <div class="photo-overlay">
                                <button class="remove-btn" data-file-id="${file.$id}">
                                    <i data-lucide="trash-2" style="width:16px;"></i> Remove
                                </button>
                            </div>
                        </div>
                    `;
                }
                galleryContainer.innerHTML = html;
                lucide.createIcons();
                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const fileId = btn.getAttribute('data-file-id');
                        if (confirm('Delete this photo permanently?')) {
                            await storage.deleteFile(BKT_ID, fileId);
                            await loadGallery();
                            await updateStats();
                        }
                    });
                });
            } catch (err) {
                console.error("Gallery error:", err);
                galleryContainer.innerHTML = `<div class="empty-gallery"><i data-lucide="alert-circle"></i><p>Could not load photos.</p></div>`;
                lucide.createIcons();
            }
        }

        function subscribeToRealtime() {
            const channel = `buckets.${BKT_ID}.files`;
            client.subscribe(channel, (response) => {
                if (response.events.includes('buckets.*.files.*.create') ||
                    response.events.includes('buckets.*.files.*.delete')) {
                    loadGallery();
                    updateStats();
                }
            });
        }

        async function downloadAllPhotos() {
            const btn = document.getElementById('downloadZipBtn');
            const original = btn ? btn.innerHTML : 'Download';
            try {
                const prefix = getEventPrefix(eventId);
                const files = (await storage.listFiles(BKT_ID, { prefix: prefix })).files || [];
                if (files.length === 0) { alert("No photos to download"); return; }
                if (btn) {
                    btn.innerHTML = `<i data-lucide="loader"></i> Zipping ${files.length} photos...`;
                    lucide.createIcons();
                }
                const zip = new JSZip();
                const folder = zip.folder(`SnapNexus_${eventId}`);
                for (let i = 0; i < files.length; i++) {
                    const blob = await fetch(storage.getFileView(BKT_ID, files[i].$id)).then(r => r.blob());
                    folder.file(`photo_${i+1}.jpg`, blob);
                }
                const content = await zip.generateAsync({ type: "blob" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `SnapNexus_${eventId}_Memories.zip`;
                link.click();
                if (btn) {
                    btn.innerHTML = `<i data-lucide="check-circle"></i> Done!`;
                    setTimeout(() => { btn.innerHTML = original; lucide.createIcons(); }, 3000);
                }
            } catch (err) {
                alert("Download failed: " + err.message);
                if (btn) btn.innerHTML = original;
                lucide.createIcons();
            }
        }

        document.getElementById('printQrBtn')?.addEventListener('click', () => {
            const guestUrl = `${window.location.origin}/app.html?event=${encodeURIComponent(eventId)}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(guestUrl)}`;
            const win = window.open("", "_blank");
            win.document.write(`
                <body style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;">
                    <h1>Scan to Join: ${currentEvent?.eventName || eventId}</h1>
                    <img src="${qrUrl}" style="width:300px;height:300px;">
                    <p style="margin-top:20px;">Point your camera here to upload photos!</p>
                    <button onclick="window.print()" style="padding:10px 20px;cursor:pointer;">Print Poster</button>
                </body>
            `);
        });

        document.getElementById('viewGuestAppBtn')?.addEventListener('click', () => {
            window.open(`app.html?event=${eventId}`, '_blank');
        });

        document.getElementById('downloadZipBtn')?.addEventListener('click', downloadAllPhotos);

        document.getElementById('endEventBtn')?.addEventListener('click', async () => {
            if (!confirm('Are you sure? Ending the event will prevent guests from uploading more photos. You can still download existing ones.')) return;
            try {
                await databases.updateDocument(DB_ID, EVENTS_TABLE, currentEvent.$id, { status: 'ended' });
                alert('Event ended successfully.');
                location.reload();
            } catch (err) {
                alert('Failed to end event: ' + err.message);
            }
        });

        document.getElementById('logoutBtn')?.addEventListener('click', async () => {
            await account.deleteSession('current');
            window.location.href = 'login.html';
        });

        document.getElementById('myEventsLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'login.html';
        });

        async function init() {
            await checkAuth();
            await loadEventDetails();
            if (currentEvent?.status !== 'ended') {
                await updateStats();
                await loadGallery();
                subscribeToRealtime();
            } else {
                // Re-attach download button for ended state
                document.getElementById('downloadZipBtnEnded')?.addEventListener('click', downloadAllPhotos);
            }
        }
        init();
    </script>
</body>
</html>
